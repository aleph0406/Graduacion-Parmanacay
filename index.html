<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#3a0505">
    <title>Invitación de Graduación</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="is-locked">
    <!-- Preloader -->
    <div id="loader" role="status" aria-live="polite">
        <div class="loader-content">
            <svg class="grad-cap-loader" viewBox="0 0 100 100" width="80" height="80" aria-hidden="true">
                <path d="M50 20 L90 35 L50 50 L10 35 Z" fill="#c3a266"></path>
                <path d="M25 41 L25 65 C25 75, 75 75, 75 65 L75 41" fill="none" stroke="#c3a266" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"></path>
                <path d="M80 38 L80 62 C80 64, 83 67, 83 72" fill="none" stroke="#c3a266" stroke-width="3" stroke-linecap="round"></path>
                <circle cx="83" cy="74" r="3" fill="#c3a266"></circle>
            </svg>
            <p class="loader-text">Cargando invitación...</p>
            <div class="loader-bar" aria-hidden="true">
                <div class="loader-progress"></div>
            </div>
        </div>
    </div>

    <div id="sparkles-container" aria-hidden="true"></div>

    <!-- 1. Video de entrada -->
    <section id="video-overlay" class="overlay" aria-label="Introducción de la invitación">
        <div class="video-wrapper">
            <video id="intro-video" playsinline muted autoplay preload="auto">
                <source src="LOGO.mp4" type="video/mp4">
                Tu navegador no soporta el formato de video.
            </video>

            <button id="skip-video-btn" class="skip-btn" type="button">
                Saltar intro <span aria-hidden="true">✕</span>
            </button>
        </div>
    </section>

    <!-- 2. Portada interactiva -->
    <section id="initial-popup" class="overlay hidden" aria-hidden="true">
        <div class="popup-content">
            <h1 class="popup-title">Haz clic aquí</h1>

            <button id="entry-btn" class="envelope-btn" type="button" aria-label="Abrir invitación de graduación">
                <img src="portada.webp" alt="Portada de la invitación de graduación" id="popup-img">
                <span class="pulse-ring" aria-hidden="true"></span>
            </button>
        </div>
    </section>

    <!-- 3. Invitación -->
    <main id="invitation-container" class="hidden" aria-hidden="true">
        <header class="invitation-header">
            <p class="eyebrow">Celebramos un logro inolvidable</p>
            <h2 class="main-title">Nuestra Graduación</h2>
            <p class="subtitle">Estás cordialmente invitado</p>
        </header>

        <section class="book-section" aria-label="Tarjeta de invitación">
            <div id="magazine-flipbook" class="flipbook">
                <article class="page">
                    <img src="1.webp" alt="Primera página de la invitación">
                </article>
                <article class="page">
                    <img src="2.webp" alt="Segunda página de la invitación">
                </article>
                <article class="page">
                    <a
                        href="https://maps.app.goo.gl/8hZwtSAnwcJmq2M36"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="page-location-link"
                        aria-label="Ver ubicación de la graduación en Google Maps"
                    >
                        <img src="3.webp" alt="Tercera página de la invitación con acceso a la ubicación">
                    </a>
                </article>
            </div>

            <div class="magazine-controls" aria-label="Controles de la invitación">
                <button id="prev-page" class="nav-btn" type="button">
                    <span class="btn-arrow" aria-hidden="true">←</span> Anterior
                </button>
                <button id="next-page" class="nav-btn" type="button">
                    Siguiente <span class="btn-arrow" aria-hidden="true">→</span>
                </button>
            </div>
            <p class="page-help">Toca la tarjeta o utiliza los botones para continuar.</p>
        </section>
    </main>

    <!-- Música y cuenta regresiva -->
    <footer id="footer-controls" class="hidden" aria-hidden="true">
        <div class="music-player">
            <audio id="bg-audio" loop preload="auto">
                <source src="./El%20Mejor%20Fondo%20Para%20Graduaci%C3%B3n.mp3" type="audio/mpeg">
                <source src="./El%20Mejor%20Fondo%20Para%20Graduacion.mp3" type="audio/mpeg">
                Tu navegador no soporta el elemento de audio.
            </audio>

            <button id="music-toggle" class="music-btn" type="button" aria-pressed="false">
                <span id="music-icon" aria-hidden="true">🎵</span>
                <span id="music-status">Escuchar melodía</span>
            </button>
        </div>

        <section class="countdown-section" aria-label="Cuenta regresiva para la graduación">
            <p class="event-date">28 de julio de 2026 · 8:30 a. m.</p>
            <h2 class="countdown-title">Faltan pocos días</h2>

            <div id="countdown-timer" aria-live="polite">
                <div class="time-block">
                    <span id="days">00</span>
                    <small>Días</small>
                </div>
                <div class="time-block">
                    <span id="hours">00</span>
                    <small>Horas</small>
                </div>
                <div class="time-block">
                    <span id="minutes">00</span>
                    <small>Min</small>
                </div>
                <div class="time-block">
                    <span id="seconds">00</span>
                    <small>Seg</small>
                </div>
            </div>

            <p class="punctual-notice">Se agradece puntualidad</p>
        </section>
    </footer>

    <noscript>
        <p class="noscript-message">Activa JavaScript para visualizar la invitación interactiva.</p>
    </noscript>

    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
